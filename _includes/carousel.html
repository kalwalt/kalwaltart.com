<div>
 <kw-carousel class="carousel2">
    {% for slide in site.data.interactivity %}
    <div class="slide">
      <img src="https://ucarecdn.com/{{ slide.up_id }}/{{ slide.name }}.jpg"
           alt="{{ slide.alt }}"
           width="720"
           height="376"
           loading="lazy" />
      <div class="caption">{{ slide.caption }}</div>
    </div>
    {% endfor %}
 </kw-carousel>
</div>
